<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boyd Vocabulary - 句子頁面</title>
    <link rel="stylesheet" href="sentence.css">

    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js" defer></script>
    
    <script src="auth-manager.js" defer></script>
    <script src="sentence.js" defer></script>
    <script src="sentence-enhancements.js" defer></script>
    <script src="custom-sentences.js" defer></script>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">資料載入中,請稍候...</p>
    </div>

    <div id="notification-container"></div>
    
    <!-- 用戶狀態頭部 -->
    <div id="user-status-header">
        <span id="user-info">載入中...</span>
        <div class="header-buttons">
            <button id="theme-toggle-btn" class="button">🌙</button>
            <button id="manage-btn" class="button" onclick="window.location.href='management.html'">⚙️ 管理</button>
            <button id="sign-out-btn" class="button is-hidden">登出</button>
            <button id="sign-in-from-guest-btn" class="button is-hidden">登入</button>
        </div>
    </div>
    
    <!-- 麵包屑導航 -->
    <div id="breadcrumb-nav"></div>

    <div id="mainPageContainer">
        <div id="searchContainer" style="text-align: center; margin-bottom: 15px;">
            <div style="display: inline-flex; align-items: center; gap: 8px;">
                <input type="text" id="searchInput" placeholder="輸入單字搜尋..." oninput="filterSentences()" style="font-size: 18px; padding: 5px; width: 200px;">
                <button id="addCustomSentenceBtn" class="add-custom-btn" onclick="openAddCustomModal()" title="新增自訂句子">＋</button>
            </div>
        </div>
        
        <div class="start-learning-container">
            <button id="startLearningBtn" class="button">開始學習</button>
        </div>

        <!-- 最近閱讀記錄 -->
        <div id="recent-sentences-container" class="recent-sentences-wrapper" style="display: none;">
            <div class="recent-sentences-header">
                <span class="recent-icon">📖</span>
                <span class="recent-title">最近閱讀/播放記錄</span>
            </div>
            <div id="recent-sentences-list" class="recent-sentences-list"></div>
        </div>

        <div class="collapsible-section-wrapper">
            <div class="collapsible-section">
                <button type="button" class="collapsible-header">字母分類</button>
                <div class="collapsible-content" id="alphabetButtons"></div>
            </div>
            <div class="collapsible-section">
                <button type="button" class="collapsible-header">主分類</button>
                <div class="collapsible-content" id="primaryCategoryButtons"></div>
            </div>
            <div class="collapsible-section">
                <button type="button" class="collapsible-header">特殊分類</button>
                <div class="collapsible-content" id="specialCategoryButtons"></div>
            </div>
            <div class="collapsible-section">
                <button type="button" class="collapsible-header">等級分類</button>
                <div class="collapsible-content" id="levelButtons"></div>
            </div>
            <!-- 第五個：我的自訂 -->
            <div class="collapsible-section">
                <button type="button" class="collapsible-header">🖊️ 我的自訂</button>
                <div class="collapsible-content" id="myCustomButtons">
                    <div class="button-wrapper">
                        <button class="letter-btn" data-value="my_custom" onclick="toggleAndCheckHeader(this)">我的自訂句子</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h2 id="wordListTitle" style="text-align: center; margin-bottom: 10px; display: none;"></h2>
    <div class="container">
        <div id="wordList" class="word-list" style="display: none;">
            <button class="button back-button" onclick="backToFirstLayer()">Back</button>
            <button id="showSelectedSentencesBtn" class="button" style="display: none; width: 80%; margin: 10px auto; background-color: #28a745;">顯示選定單字的句子</button>
            <div id="wordItems"></div>
        </div>
        <div id="sentenceList" class="word-list" style="display: none;">
            <button class="button back-button" onclick="backToFirstLayer()">Back</button>
            <div id="sentenceItems"></div>
            <!-- Word列表內新增句子按鈕 -->
            <div id="addSentenceInListContainer" style="display:none; text-align:center; padding: 15px 0;">
                <button class="add-in-list-btn" onclick="openAddCustomModalForWord()">＋ 新增句子到此單字</button>
            </div>
        </div>

        <div id="sentenceDetails" class="details" style="display: none;">
            <button class="button" onclick="backToSentenceList(event)">Back</button>
            <button id="prevSentenceBtn" class="arrow-btn left" onclick="switchToPreviousSentence()">◀</button>
            <button id="nextSentenceBtn" class="arrow-btn right" onclick="switchToNextSentence()">▶</button>
            <div id="sentenceHeader"></div>
            <div id="phoneticContainer"></div>
            <div id="sentenceContainer"></div>
            <div id="chineseContainer"></div>

            <div class="audio-controls-wrapper">
                <div class="audio-controls">
                  <button class="audio-btn" id="playAudioBtn" onclick="playSentenceAudio(currentSentenceList[currentSentenceIndex].Words + '.mp3')">
                    <img src="https://raw.githubusercontent.com/BoydYang-Designer/English-vocabulary/main/Svg/play.svg"
                         alt="Play" width="24" height="24" />
                  </button>
              
                  <button class="audio-btn" onclick="adjustAudioTime(-2.5)">
                    <img src="https://raw.githubusercontent.com/BoydYang-Designer/English-vocabulary/main/Svg/rewind.svg"
                         alt="Rewind" width="24" height="24" />
                  </button>
              
                  <button class="audio-btn" id="pauseResumeBtn" onclick="togglePauseAudio(this)">
                    <img src="https://raw.githubusercontent.com/BoydYang-Designer/English-vocabulary/main/Svg/pause.svg"
                         alt="Pause" width="24" height="24" />
                  </button>
                </div>
            </div>

            <div id="searchInDetails">
                <input type="text" id="searchInputDetails" placeholder="輸入單字搜尋..." oninput="filterSentencesInDetails()">
            </div>
            <div id="searchResultsDetails" style="max-height: 200px; overflow-y: auto; text-align: left;"></div>

            <div id="noteContainer">
                <textarea id="sentenceNote" placeholder="輸入筆記..." style="width: 100%; height: 80px;" oninput="updateCheckbox()"></textarea>
                <p id="savedNote"></p>
            </div>

            <div id="storageButtons" style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
                <div style="display: flex; align-items: center;">
                    <input type="checkbox" id="noteCheckbox" onclick="handleCheckboxClick()" style="margin-right: 10px;">
                    <button onclick="saveNote()" id="saveNoteButton" class="note-button">Save Note</button>
                    <button onclick="exportAllData()" id="exportButton" class="note-button">Export</button>
                    <button onclick="importAllData()" id="importButton" class="note-button">Import</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 新增自訂句子 Modal ===== -->
    <div id="addCustomModal" class="custom-modal-overlay" style="display:none;">
        <div class="custom-modal">
            <div class="custom-modal-header">
                <h3 id="customModalTitle">新增自訂句子</h3>
                <button class="custom-modal-close" onclick="closeAddCustomModal()">✕</button>
            </div>
            <div class="custom-modal-body">
                <!-- 隱藏欄位記錄編輯模式 -->
                <input type="hidden" id="editCustomId" value="">
                
                <div class="form-group">
                    <label>Words（單字編號）<span class="required">*</span></label>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input type="text" id="customWords" placeholder="例：absorb" class="form-input" oninput="suggestCustomWordsId()">
                        <span id="customWordsIdPreview" class="words-id-preview"></span>
                    </div>
                    <small id="customWordsHint" class="form-hint">輸入單字，系統將自動編號</small>
                </div>

                <div class="form-group">
                    <label>英文句子 <span class="required">*</span></label>
                    <textarea id="customSentence" placeholder="輸入英文句子..." class="form-input" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>中文翻譯 <span style="font-size:11px;color:#999;">（選填）</span></label>
                    <textarea id="customChinese" placeholder="輸入中文翻譯..." class="form-input" rows="2"></textarea>
                </div>

                <div class="form-group form-group-inline">
                    <div>
                        <label>等級</label>
                        <select id="customLevel" class="form-input">
                            <option value="">-- 選擇等級 --</option>
                            <option value="A1">A1</option>
                            <option value="A2">A2</option>
                            <option value="B1">B1</option>
                            <option value="B2">B2</option>
                            <option value="C1">C1</option>
                            <option value="C2">C2</option>
                        </select>
                    </div>
                    <div>
                        <label>名人</label>
                        <input type="text" id="customCelebrity" placeholder="選填" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>分類1</label>
                    <input type="text" id="customCat1" placeholder="選填" class="form-input">
                </div>
                <div class="form-group form-group-inline">
                    <div>
                        <label>分類2</label>
                        <input type="text" id="customCat2" placeholder="選填" class="form-input">
                    </div>
                    <div>
                        <label>分類3</label>
                        <input type="text" id="customCat3" placeholder="選填" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>記錄</label>
                    <input type="text" id="customRecord" placeholder="選填備注" class="form-input">
                </div>
            </div>
            <div class="custom-modal-footer">
                <button class="btn-cancel" onclick="closeAddCustomModal()">取消</button>
                <button class="btn-save" onclick="saveCustomSentence()">儲存</button>
            </div>
        </div>
    </div>

</body>
</html>
